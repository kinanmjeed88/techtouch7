<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <link rel="stylesheet" href="{{ "style_enhanced.css" | relURL }}">
    <link rel="stylesheet" href="{{ "style_modern.css" | relURL }}">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        {{ partial "header.html" . }}
        
        <main class="main-content">
            {{ block "main" . }}{{ end }}
        </main>

        {{ partial "footer.html" . }}
    </div>

    <!-- Pop-up Modal Structure -->
    <div id="popupModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalContent" class="modal-grid"></div>
        </div>
    </div>

    <script src="{{ "script_ultimate_fix.js" | relURL }}"></script>
    <script>
        // ميزة البحث المحسنة لصفحة جميع المنشورات
        document.addEventListener('DOMContentLoaded', function() {
            // التحقق من أننا في صفحة جميع المنشورات
            if (!window.location.pathname.includes('/all-posts/') && !window.location.href.includes('all-posts')) {
                return;
            }

            // إنشاء مربع البحث الواضح والمرئي
            const searchSection = document.createElement('div');
            searchSection.className = 'search-section-visible';
            searchSection.style.cssText = `
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                padding: 20px;
                margin: 20px auto;
                border-radius: 15px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.1);
                max-width: 800px;
                text-align: center;
            `;

            const searchTitle = document.createElement('h3');
            searchTitle.textContent = 'البحث في المنشورات';
            searchTitle.style.cssText = `
                color: white;
                margin-bottom: 15px;
                font-size: 24px;
                font-weight: bold;
            `;

            const searchContainer = document.createElement('div');
            searchContainer.className = 'search-container-enhanced';
            searchContainer.style.cssText = `
                position: relative;
                display: flex;
                align-items: center;
                background: white;
                border-radius: 50px;
                padding: 5px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                max-width: 500px;
                margin: 0 auto;
            `;

            const searchInput = document.createElement('input');
            searchInput.id = 'search-input-enhanced';
            searchInput.type = 'text';
            searchInput.placeholder = '🔍 ابحث عن عنوان المنشور...';
            searchInput.style.cssText = `
                border: none;
                outline: none;
                padding: 15px 20px;
                font-size: 16px;
                width: 100%;
                border-radius: 50px;
                direction: rtl;
                text-align: right;
                background: transparent;
            `;

            const clearButton = document.createElement('button');
            clearButton.id = 'clear-search-enhanced';
            clearButton.innerHTML = '✕';
            clearButton.style.cssText = `
                position: absolute;
                left: 15px;
                background: none;
                border: none;
                font-size: 18px;
                cursor: pointer;
                color: #999;
                display: none;
                padding: 5px;
                border-radius: 50%;
                transition: all 0.3s ease;
            `;

            // تجميع عناصر البحث
            searchContainer.appendChild(searchInput);
            searchContainer.appendChild(clearButton);
            searchSection.appendChild(searchTitle);
            searchSection.appendChild(searchContainer);

            // إنشاء منطقة معلومات النتائج
            const searchInfo = document.createElement('div');
            searchInfo.id = 'search-info-enhanced';
            searchInfo.style.cssText = `
                text-align: center;
                margin: 15px 0;
                padding: 10px;
                background: #f8f9fa;
                border-radius: 10px;
                color: #666;
                display: none;
            `;

            // العثور على المكان المناسب لإدراج البحث
            const mainContent = document.querySelector('main') || document.querySelector('.container') || document.body;
            const titleElement = document.querySelector('h1') || document.querySelector('.container h1') || mainContent.querySelector('h1');
            
            if (titleElement) {
                // إدراج البحث بعد العنوان مباشرة
                titleElement.parentNode.insertBefore(searchSection, titleElement.nextSibling);
                titleElement.parentNode.insertBefore(searchInfo, searchSection.nextSibling);
            } else {
                // إدراج البحث في بداية المحتوى الرئيسي
                mainContent.insertBefore(searchSection, mainContent.firstChild);
                mainContent.insertBefore(searchInfo, searchSection.nextSibling);
            }

            // متغيرات البحث
            let allPosts = [];
            let originalDisplay = new Map();
            
            // جمع جميع المنشورات من الصفحة
            function collectPosts() {
                // البحث عن المنشورات بطرق متعددة
                const selectors = [
                    'a[href*="/posts/"]',
                    'a[href*="/post/"]',
                    '.post-card-thin a',
                    '.post-card a',
                    '.post-item a',
                    'article a',
                    '.post a',
                    'div[class*="post"] a'
                ];
                
                let postElements = [];
                for (const selector of selectors) {
                    const elements = document.querySelectorAll(selector);
                    if (elements.length > 0) {
                        postElements = Array.from(elements);
                        break;
                    }
                }

                allPosts = postElements.map(link => {
                    const postContainer = link.closest('div') || link.parentElement;
                    const title = link.textContent.trim();
                    
                    // حفظ العرض الأصلي
                    if (!originalDisplay.has(postContainer)) {
                        originalDisplay.set(postContainer, window.getComputedStyle(postContainer).display);
                    }
                    
                    return {
                        element: postContainer,
                        title: title,
                        link: link.href
                    };
                }).filter(post => post.title && post.title.length > 0);

                console.log(`تم العثور على ${allPosts.length} منشور`);
            }

            // تنفيذ البحث
            function performSearch(query) {
                const trimmedQuery = query.trim();
                
                if (!trimmedQuery) {
                    // إظهار جميع المنشورات
                    allPosts.forEach(post => {
                        const originalDisplayValue = originalDisplay.get(post.element) || 'block';
                        post.element.style.display = originalDisplayValue;
                    });
                    searchInfo.style.display = 'none';
                    clearButton.style.display = 'none';
                    return;
                }

                clearButton.style.display = 'block';

                const filteredPosts = allPosts.filter(post => 
                    post.title.toLowerCase().includes(trimmedQuery.toLowerCase()) ||
                    post.title.includes(trimmedQuery)
                );

                // إخفاء جميع المنشورات أولاً
                allPosts.forEach(post => {
                    post.element.style.display = 'none';
                });
                
                // إظهار المنشورات المطابقة فقط
                filteredPosts.forEach(post => {
                    const originalDisplayValue = originalDisplay.get(post.element) || 'block';
                    post.element.style.display = originalDisplayValue;
                });

                // عرض معلومات النتائج
                if (filteredPosts.length === 0) {
                    searchInfo.innerHTML = `❌ لم يتم العثور على نتائج للبحث: "${trimmedQuery}"`;
                    searchInfo.style.background = '#ffe6e6';
                    searchInfo.style.color = '#d63031';
                } else {
                    searchInfo.innerHTML = `✅ تم العثور على ${filteredPosts.length} نتيجة للبحث: "${trimmedQuery}"`;
                    searchInfo.style.background = '#e6ffe6';
                    searchInfo.style.color = '#00b894';
                }
                
                searchInfo.style.display = 'block';
            }

            // أحداث التفاعل
            searchInput.addEventListener('input', function() {
                performSearch(this.value);
            });

            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch(this.value);
                }
            });

            clearButton.addEventListener('click', function() {
                searchInput.value = '';
                performSearch('');
            });

            // تأثيرات بصرية
            searchInput.addEventListener('focus', function() {
                searchContainer.style.boxShadow = '0 6px 20px rgba(102, 126, 234, 0.3)';
                searchContainer.style.transform = 'translateY(-2px)';
            });

            searchInput.addEventListener('blur', function() {
                searchContainer.style.boxShadow = '0 4px 15px rgba(0,0,0,0.1)';
                searchContainer.style.transform = 'translateY(0)';
            });

            clearButton.addEventListener('mouseenter', function() {
                this.style.background = '#f1f3f4';
                this.style.color = '#d63031';
            });

            clearButton.addEventListener('mouseleave', function() {
                this.style.background = 'none';
                this.style.color = '#999';
            });

            // تهيئة البحث
            setTimeout(() => {
                collectPosts();
                console.log('ميزة البحث المحسنة تم تحميلها بنجاح');
            }, 1000);
        });
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
